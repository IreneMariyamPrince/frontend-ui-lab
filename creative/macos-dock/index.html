<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>macOS Dock</title>
</head>
<body>
  
  <div class="container">
    <div class="dock">
      <div class="dock-item">
        <div class="dock-icon" style="background-color: #ef4444;"></div>
        <div class="dock-tooltip">Finder</div>
      </div>
      <div class="dock-item">
        <div class="dock-icon" style="background-color: #f97316;"></div>
        <div class="dock-tooltip">Launchpad</div>
      </div>
      <div class="dock-item">
        <div class="dock-icon" style="background-color: #eab308;"></div>
        <div class="dock-tooltip">Safari</div>
      </div>
      <div class="dock-item">
        <div class="dock-icon" style="background-color: #22c55e;"></div>
        <div class="dock-tooltip">Messages</div>
      </div>
      <div class="dock-item">
        <div class="dock-icon" style="background-color: #3b82f6;"></div>
        <div class="dock-tooltip">Mail</div>
      </div>
      <div class="dock-item">
        <div class="dock-icon" style="background-color: #8b5cf6;"></div>
        <div class="dock-tooltip">Maps</div>
      </div>
      <div class="dock-item">
        <div class="dock-icon" style="background-color: #ec4899;"></div>
        <div class="dock-tooltip">Photos</div>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
