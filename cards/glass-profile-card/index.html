<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass Profile Card</title>
</head>
<body>
  <!-- Decorative background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card-container" id="tilt-card">
    <div class="glass-card">
      <div class="card-content">
        <div class="avatar-container">
          <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400&h=400&fit=crop" alt="Profile" class="avatar" />
        </div>
        
        <h2 class="name">Jane Doe</h2>
        <p class="role">Frontend Engineer</p>
        
        <div class="stats">
          <div class="stat">
            <span class="value">142</span>
            <span class="label">Repos</span>
          </div>
          <div class="stat">
            <span class="value">1.2k</span>
            <span class="label">Followers</span>
          </div>
          <div class="stat">
            <span class="value">85</span>
            <span class="label">Stars</span>
          </div>
        </div>
        
        <div class="actions">
          <button class="btn btn-primary">Follow</button>
          <button class="btn btn-secondary">Message</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
