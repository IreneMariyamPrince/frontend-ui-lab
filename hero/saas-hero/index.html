<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Hero - Mesh Gradient</title>
</head>
<body>
  
  <!-- Animated Mesh Gradient Background -->
  <div class="mesh-bg">
    <div class="color-blob blob-1"></div>
    <div class="color-blob blob-2"></div>
    <div class="color-blob blob-3"></div>
    <div class="noise-overlay"></div>
  </div>

  <nav class="navbar">
    <div class="logo">
      <div class="logo-mark"></div>
      <span>Nexus</span>
    </div>
    <div class="nav-links">
      <a href="#">Features</a>
      <a href="#">Pricing</a>
      <a href="#">Documentation</a>
    </div>
    <div class="nav-actions">
      <a href="#" class="login">Log in</a>
      <a href="#" class="btn btn-primary btn-sm">Get Started</a>
    </div>
  </nav>

  <main class="hero-section">
    <div class="hero-content">
      <div class="pill-badge">
        <span class="pulse-dot"></span>
        Introducing Nexus v2.0
      </div>
      
      <h1 class="headline reveal-up">
        Build faster with <br/>
        <span class="text-gradient">intelligent automation</span>
      </h1>
      
      <p class="subheadline reveal-up delay-1">
        Nexus helps modern teams ship products 10x faster. Connect your entire workflow, automate repetitive tasks, and scale without limits.
      </p>
      
      <div class="cta-group reveal-up delay-2">
        <button class="btn btn-primary btn-lg">Start Building Free</button>
        <button class="btn btn-secondary btn-lg">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          Watch Demo
        </button>
      </div>
    </div>

    <!-- 3D Mockup Container -->
    <div class="mockup-container reveal-up delay-3">
      <div class="mockup-glow"></div>
      <div class="dashboard-mockup">
        
        <!-- Fake UI inside the mockup -->
        <div class="mockup-header">
          <div class="window-controls">
            <span></span><span></span><span></span>
          </div>
          <div class="search-bar"></div>
        </div>
        
        <div class="mockup-body">
          <div class="sidebar">
            <div class="nav-item active"></div>
            <div class="nav-item"></div>
            <div class="nav-item"></div>
            <div class="nav-item"></div>
          </div>
          <div class="main-view">
            <div class="stats-row">
              <div class="stat-card">
                <div class="chart-line"></div>
              </div>
              <div class="stat-card">
                <div class="chart-bar-mini"></div>
              </div>
              <div class="stat-card"></div>
            </div>
            <div class="data-table">
              <div class="table-row header"></div>
              <div class="table-row"></div>
              <div class="table-row"></div>
              <div class="table-row"></div>
              <div class="table-row"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="./script.js"></script>
</body>
</html>
