<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics Cards</title>
</head>
<body>
  
  <div class="dashboard-container">
    <div class="header">
      <h1>Overview</h1>
      <p>Your performance summary for the last 30 days.</p>
    </div>
    
    <div class="metrics-grid">
      
      <!-- Card 1 -->
      <div class="metric-card">
        <div class="card-header">
          <span class="card-title">Total Revenue</span>
          <div class="icon-wrapper purple">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
          </div>
        </div>
        <div class="card-value" data-target="45231.89" data-prefix="$">0</div>
        <div class="card-footer">
          <span class="trend positive">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
            12.5%
          </span>
          <span class="vs-text">vs last month</span>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="metric-card">
        <div class="card-header">
          <span class="card-title">Active Users</span>
          <div class="icon-wrapper blue">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          </div>
        </div>
        <div class="card-value" data-target="2841">0</div>
        <div class="card-footer">
          <span class="trend positive">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
            5.2%
          </span>
          <span class="vs-text">vs last month</span>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="metric-card">
        <div class="card-header">
          <span class="card-title">Churn Rate</span>
          <div class="icon-wrapper orange">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
          </div>
        </div>
        <div class="card-value" data-target="2.4" data-suffix="%">0</div>
        <div class="card-footer">
          <span class="trend negative">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg>
            1.1%
          </span>
          <span class="vs-text">vs last month</span>
        </div>
      </div>

      <!-- Card 4 -->
      <div class="metric-card">
        <div class="card-header">
          <span class="card-title">Avg Session</span>
          <div class="icon-wrapper green">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          </div>
        </div>
        <div class="card-value" data-target="4.2" data-suffix="m">0</div>
        <div class="card-footer">
          <span class="trend neutral">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            0.0%
          </span>
          <span class="vs-text">vs last month</span>
        </div>
      </div>

    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
