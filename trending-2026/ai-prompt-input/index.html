<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Prompt Box 2.0</title>
</head>
<body>
  
  <div class="demo-container">
    <h2>Ask the Oracle</h2>
    
    <div class="prompt-container" id="promptContainer">
      <!-- Animated Gradient Border Wrapper -->
      <div class="gradient-border"></div>
      
      <div class="prompt-inner">
        <textarea id="promptInput" rows="1" placeholder="What would you like to build today?"></textarea>
        
        <div class="prompt-actions">
          <button class="action-btn" aria-label="Attach file">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
          </button>
          
          <button class="submit-btn" id="submitBtn" aria-label="Send message">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
      </div>
      
      <!-- Generating State Overlay -->
      <div class="generating-overlay" id="generatingOverlay">
        <div class="dots">
          <span></span><span></span><span></span>
        </div>
        <p>Synthesizing response...</p>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
