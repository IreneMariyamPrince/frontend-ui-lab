<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experimental Custom Select</title>
</head>
<body>
  
  <div class="demo-container">
    <h2>Choose your element</h2>
    
    <div class="custom-select" id="customSelect">
      <!-- The visible trigger button -->
      <button class="select-trigger" aria-haspopup="listbox" aria-expanded="false" id="selectTrigger">
        <span class="selected-value">Select an option...</span>
        <div class="arrow-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
      </button>

      <!-- The dropdown list -->
      <ul class="select-options" role="listbox" id="selectOptions">
        <li class="option" role="option" data-value="fire">
          <div class="option-icon">🔥</div>
          <span>Fire</span>
        </li>
        <li class="option" role="option" data-value="water">
          <div class="option-icon">💧</div>
          <span>Water</span>
        </li>
        <li class="option" role="option" data-value="earth">
          <div class="option-icon">🌿</div>
          <span>Earth</span>
        </li>
        <li class="option" role="option" data-value="air">
          <div class="option-icon">💨</div>
          <span>Air</span>
        </li>
      </ul>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
