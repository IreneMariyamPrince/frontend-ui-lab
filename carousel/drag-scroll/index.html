<html lang="en">

  <title>Drag-to-Scroll Carousel</title>

      <div class="item"><img src="https://images.unsplash.com/photo-1518676590629-3dcbd9c5a5c9?w=400&h=600&fit=crop" alt="Movie 5"></div>
      <div class="item"><img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400&h=600&fit=crop" alt="Movie 6"></div>
      <div class="item"><img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=400&h=600&fit=crop" alt="Movie 7"></div>
      <div class="item"><img src="https://images.unsplash.com/photo-1616530940355-351fabd9524b?w=400&h=600&fit=crop" alt="Movie 8"></div>

  </div>
  <script src="./script.js"></script>
</body>
</html>
