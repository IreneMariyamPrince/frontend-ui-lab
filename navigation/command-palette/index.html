<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command Palette UI</title>
</head>
<body>
  
  <div class="page-content">
    <h1>Command Palette Demo</h1>
    <p>Press <kbd>Ctrl</kbd> + <kbd>K</kbd> (or <kbd>Cmd</kbd> + <kbd>K</kbd>) to open the command palette.</p>
    <button class="btn btn-primary" id="openPaletteBtn">Open Palette</button>
  </div>

  <!-- Command Palette Modal -->
  <div class="palette-overlay" id="paletteOverlay">
    <div class="palette-container" id="paletteContainer">
      
      <!-- Search Input -->
      <div class="palette-header">
        <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="paletteInput" placeholder="Search for apps, settings, and commands..." autocomplete="off" />
        <button class="close-btn" id="closePaletteBtn">
          <kbd>ESC</kbd>
        </button>
      </div>

      <!-- Results List -->
      <div class="palette-body">
        
        <div class="results-group">
          <div class="group-title">Suggestions</div>
          <ul class="results-list" id="resultsList">
            <!-- Items are injected here or pre-rendered -->
            <li class="result-item active" data-index="0">
              <div class="item-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
              </div>
              <div class="item-text">Create new document</div>
              <div class="item-shortcut"><kbd>⌘</kbd> <kbd>N</kbd></div>
            </li>
            <li class="result-item" data-index="1">
              <div class="item-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              </div>
              <div class="item-text">Invite team member</div>
            </li>
            <li class="result-item" data-index="2">
              <div class="item-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
              </div>
              <div class="item-text">View calendar</div>
            </li>
          </ul>
        </div>

        <div class="results-group">
          <div class="group-title">Settings</div>
          <ul class="results-list">
            <li class="result-item" data-index="3">
              <div class="item-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
              </div>
              <div class="item-text">Account preferences</div>
            </li>
            <li class="result-item" data-index="4">
              <div class="item-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
              </div>
              <div class="item-text">API Keys</div>
            </li>
          </ul>
        </div>

      </div>
      
      <div class="palette-footer">
        <div class="tip">
          <span>Navigate with</span>
          <kbd>↑</kbd> <kbd>↓</kbd>
        </div>
        <div class="tip">
          <span>Select with</span>
          <kbd>↵</kbd>
        </div>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
