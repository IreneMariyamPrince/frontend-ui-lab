<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTP Verification</title>
</head>
<body>
  
  <div class="auth-container">
    <div class="auth-card">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      </div>
      
      <h2>Check your email</h2>
      <p>We sent a verification code to <strong>olivia@acme.com</strong>. Please enter it below.</p>
      
      <form id="otpForm" class="otp-form">
        <div class="otp-inputs">
          <input type="text" maxlength="1" class="otp-field" autofocus />
          <input type="text" maxlength="1" class="otp-field" />
          <input type="text" maxlength="1" class="otp-field" />
          <input type="text" maxlength="1" class="otp-field" />
          <input type="text" maxlength="1" class="otp-field" />
          <input type="text" maxlength="1" class="otp-field" />
        </div>
        
        <button type="submit" class="submit-btn" disabled>Verify Code</button>
      </form>
      
      <div class="resend-text">
        Didn't receive the code? <a href="#" id="resendBtn">Click to resend</a>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
