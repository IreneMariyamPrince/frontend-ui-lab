<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Stepper</title>
</head>
<body>
  
  <div class="checkout-container">
    <h2>Secure Checkout</h2>

    <!-- Stepper Component -->
    <div class="stepper-wrapper">
      <!-- Progress Line -->
      <div class="progress-line-container">
        <div class="progress-line" id="progressLine"></div>
      </div>

      <!-- Step Items -->
      <div class="step-item completed" data-step="1">
        <div class="step-circle">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div class="step-title">Cart</div>
      </div>
      
      <div class="step-item active" data-step="2">
        <div class="step-circle">2</div>
        <div class="step-title">Shipping</div>
      </div>
      
      <div class="step-item" data-step="3">
        <div class="step-circle">3</div>
        <div class="step-title">Payment</div>
      </div>
      
      <div class="step-item" data-step="4">
        <div class="step-circle">4</div>
        <div class="step-title">Review</div>
      </div>
    </div>

    <!-- Content Area (Mock) -->
    <div class="step-content">
      <h3 id="stepHeader">Shipping Information</h3>
      <p>Please enter your shipping address to calculate delivery costs.</p>
      
      <!-- Mock Form Fields -->
      <div class="mock-form">
        <div class="input-line"></div>
        <div class="input-line"></div>
        <div class="input-line half"></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="stepper-controls">
      <button class="btn btn-outline" id="prevBtn">Back</button>
      <button class="btn btn-primary" id="nextBtn">Continue to Payment</button>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
