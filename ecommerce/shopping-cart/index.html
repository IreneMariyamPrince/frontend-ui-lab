<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slide-out Shopping Cart</title>
</head>
<body>
  
  <div class="page-content">
    <h1>E-Commerce Store</h1>
    <p>Click the button below to view your cart.</p>
    <button class="open-cart-btn" id="openCartBtn">
      <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
      View Cart (<span id="cartCount">2</span>)
    </button>
  </div>

  <!-- Cart Overlay -->
  <div class="cart-overlay" id="cartOverlay"></div>

  <!-- Cart Drawer -->
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="close-cart-btn" id="closeCartBtn" aria-label="Close cart">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>

    <div class="cart-items" id="cartItems">
      <!-- Item 1 -->
      <div class="cart-item" data-price="120">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80" alt="Nike Air Zoom" class="item-image" />
        <div class="item-details">
          <h3 class="item-name">Nike Air Zoom Pegasus</h3>
          <p class="item-variant">Color: Red | Size: 10</p>
          <div class="item-price-qty">
            <span class="item-price">$120.00</span>
            <div class="qty-control">
              <button class="qty-btn minus" aria-label="Decrease quantity">-</button>
              <input type="number" class="qty-input" value="1" min="1" max="10" readonly />
              <button class="qty-btn plus" aria-label="Increase quantity">+</button>
            </div>
          </div>
        </div>
        <button class="remove-btn" aria-label="Remove item">
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
      </div>

      <!-- Item 2 -->
      <div class="cart-item" data-price="45">
        <img src="https://images.unsplash.com/photo-1576566588028-4147f3842f27?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80" alt="Nike T-Shirt" class="item-image" />
        <div class="item-details">
          <h3 class="item-name">Nike Essential T-Shirt</h3>
          <p class="item-variant">Color: White | Size: M</p>
          <div class="item-price-qty">
            <span class="item-price">$45.00</span>
            <div class="qty-control">
              <button class="qty-btn minus" aria-label="Decrease quantity">-</button>
              <input type="number" class="qty-input" value="1" min="1" max="10" readonly />
              <button class="qty-btn plus" aria-label="Increase quantity">+</button>
            </div>
          </div>
        </div>
        <button class="remove-btn" aria-label="Remove item">
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
      </div>
    </div>

    <!-- Empty State (Hidden by default) -->
    <div class="empty-cart" id="emptyCart" style="display: none;">
      <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" class="empty-icon"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
      <p>Your cart is empty.</p>
    </div>

    <div class="cart-footer">
      <div class="summary-row">
        <span>Subtotal</span>
        <span id="subtotalAmount">$165.00</span>
      </div>
      <div class="summary-row">
        <span>Tax (8%)</span>
        <span id="taxAmount">$13.20</span>
      </div>
      <div class="summary-row total-row">
        <span>Total</span>
        <span id="totalAmount">$178.20</span>
      </div>
      <button class="checkout-btn">Proceed to Checkout</button>
    </div>
  </aside>

  <script src="./script.js"></script>
</body>
</html>
