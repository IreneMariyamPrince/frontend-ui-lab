<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Glass Modal</title>
</head>
<body>
  
  <div class="page-content">
    <h1>Account Settings</h1>
    <p>Click the button below to trigger a destructive action that requires confirmation.</p>
    
    <button class="btn btn-danger" id="openModalBtn">Delete Account</button>
  </div>

  <!-- Modal Backdrop -->
  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true"></div>

  <!-- Modal Dialog -->
  <div class="modal" id="customModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalDesc" aria-hidden="true">
    <div class="modal-header">
      <div class="modal-icon warning">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      </div>
      <button class="modal-close" id="closeModalIcon" aria-label="Close modal">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    
    <div class="modal-body">
      <h2 id="modalTitle">Delete account</h2>
      <p id="modalDesc">Are you sure you want to deactivate your account? All of your data will be permanently removed. This action cannot be undone.</p>
    </div>
    
    <div class="modal-footer">
      <button class="btn btn-outline" id="cancelModalBtn">Cancel</button>
      <button class="btn btn-danger" id="confirmModalBtn">Yes, delete account</button>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
